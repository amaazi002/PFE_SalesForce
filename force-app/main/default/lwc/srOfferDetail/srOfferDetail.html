<!-- force-app/main/default/lwc/srOfferDetail/srOfferDetail.html -->
<template>
  <div class="detail-wrapper">
    <article class="detail">
      <!-- En‑tête -->
      <header class="detail__head">
        <h2 class="detail__title">{offer.Titre__c}</h2>
        <button class="btn-close" title="Fermer" onclick={close} aria-label="Fermer la fenêtre">×</button>
      </header>

      <!-- Méta (pills) -->
      <div class="detail__meta">
        <template if:true={offer.Deadline__c}>
          <span class="pill">Date limite : {deadlineText}</span>
        </template>
        <template if:true={offer.Departement__c}>
          <span class="pill">Département : {offer.Departement__c}</span>
        </template>
        <template if:true={offer.Localisation__c}>
          <span class="pill">Localisation : {offer.Localisation__c}</span>
        </template>
        <template if:true={offer.Statut__c}>
          <span class="pill">Statut : {offer.Statut__c}</span>
        </template>
      </div>

      <!-- Description -->
      <section class="block">
        <div class="block__label">Description</div>
        <div class="block__text">{offer.Description__c}</div>
      </section>

      <!-- Compétences (facultatif) -->
      <template if:true={offer.CompetencesRequises__c}>
        <section class="block">
          <div class="block__label">Compétences</div>
          <div class="block__text">{offer.CompetencesRequises__c}</div>
        </section>
      </template>

      <!-- Actions -->
      <footer class="detail__foot">
        <lightning-button label="Fermer" onclick={close}></lightning-button>
        <lightning-button class="slds-m-left_small" variant="brand" label="Postuler" onclick={openApply}></lightning-button>
      </footer>
    </article>
  </div>

  <!-- Sous‑overlay : Formulaire de candidature hébergé dans le détail -->
  <template if:true={showApply}>
    <div class="suboverlay" role="dialog" aria-modal="true" onclick={hideApply}>
      <div class="suboverlay__card" onclick={stop}>
        <c-sr-apply-form
          offer-id={offerId}
          offer-name={offer.Titre__c}
          onclose={hideApply}
          onapplied={applyDone}>
        </c-sr-apply-form>
      </div>
    </div>
  </template>
</template>
