<template>
    <div class="rec-container" onclick={handleOutsideClick}>

        <!-- ══════════════════════ Header ══════════════════════ -->
        <div class="rec-header">
            <div class="rec-header-left">
                <div class="rec-header-icon">👥</div>
                <div>
                    <h1 class="rec-title">Gestion des Utilisateurs</h1>
                    <p class="rec-subtitle">{totalUsers} utilisateur(s)</p>
                </div>
            </div>
            <div class="rec-header-right">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input
                        type="search"
                        class="search-input"
                        placeholder="Rechercher un utilisateur..."
                        value={searchTerm}
                        onchange={handleSearch}
                    />
                </div>
            </div>
        </div>

        <!-- ══════════════════════ Tableau ══════════════════════ -->
        <div class="rec-table-wrapper">
            <table class="rec-table">
                <thead>
                    <tr>
                        <th class="th-avatar"></th>
                        <th class="th-offre">Nom complet</th>
                        <th class="th-center">Email</th>
                        <th class="th-center">Rôle</th>
                        <th class="th-center">Statut</th>
                        <th class="th-center">Date création</th>
                        <th class="th-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template if:true={hasUsers}>
                        <template for:each={filteredUsers} for:item="user">
                            <tr key={user.Id} class={user.rowClass}>

                                <!-- Avatar -->
                                <td class="td-avatar">
                                    <div class="user-avatar">{user.initials}</div>
                                </td>

                                <!-- Nom -->
                                <td class="td-offre">
                                    <div class="user-name">{user.fullName}</div>
                                    <div class="user-sub">{user.lastName}</div>
                                </td>

                                <!-- Email -->
                                <td class="td-center">
                                    <span class="meta-chip">{user.email}</span>
                                </td>

                                <!-- Rôle -->
                                <td class="td-center">
                                    <span class="role-chip">{user.roleLabel}</span>
                                </td>

                                <!-- Statut -->
                                <td class="td-center">
                                    <span class={user.badgeClass}>{user.statutLabel}</span>
                                </td>

                                <!-- Date -->
                                <td class="td-center">
                                    <span class="date-chip">{user.createdDateFmt}</span>
                                </td>

                                <!-- Actions (3 points) -->
                                <td class="td-center action-cell">
                                    <button
                                        class="btn-dots"
                                        title="Actions"
                                        data-id={user.Id}
                                        onclick={toggleDropdown}>
                                        ⋮
                                    </button>

                                    <template if:true={user.isMenuOpen}>
                                        <div class="dropdown-menu">
                                            <ul class="dropdown-list" role="menu">
                                                <li role="presentation">
                                                    <button
                                                        class="menu-item menu-item_warning"
                                                        data-id={user.Id}
                                                        data-action="block"
                                                        onclick={handleAction}>
                                                        🚫 Bloquer
                                                    </button>
                                                </li>
                                                <li role="presentation">
                                                    <button
                                                        class="menu-item menu-item_danger"
                                                        data-id={user.Id}
                                                        data-action="ban"
                                                        onclick={handleAction}>
                                                        ⛔ Bannir
                                                    </button>
                                                </li>
                                                <li role="presentation">
                                                    <button
                                                        class="menu-item menu-item_warning"
                                                        data-id={user.Id}
                                                        data-action="deactivate"
                                                        onclick={handleAction}>
                                                        ⏸ Désactiver
                                                    </button>
                                                </li>
                                                <li class="dropdown-divider"></li>
                                                <li role="presentation">
                                                    <button
                                                        class="menu-item menu-item_danger"
                                                        data-id={user.Id}
                                                        data-action="delete"
                                                        onclick={handleAction}>
                                                        🗑 Supprimer
                                                    </button>
                                                </li>
                                            </ul>
                                        </div>
                                    </template>
                                </td>

                            </tr>
                        </template>
                    </template>

                    <template if:false={hasUsers}>
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <div class="empty-icon">👤</div>
                                    <p>Aucun utilisateur trouvé.</p>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

    </div>

    <!-- ══════════════════════ Modale Confirmation ══════════════════════ -->
    <template if:true={isConfirmModalOpen}>
        <div onclick={closeConfirmModal} class="modal-backdrop"></div>
        <div class="modal-box" onclick={stopPropagation}>
            <div class="modal-header">
                <div class="modal-header-content">
                    <div class="modal-header-icon">⚠️</div>
                    <div>
                        <h2 class="modal-title">{confirmTitle}</h2>
                        <p class="modal-subtitle">Action irréversible</p>
                    </div>
                </div>
                <button class="modal-close" onclick={closeConfirmModal}>✕</button>
            </div>
            <div class="modal-body modal-body-center">
                <p class="confirm-message">{confirmMessage}</p>
                <p class="confirm-user">
                    Utilisateur : <strong>{confirmUserName}</strong>
                </p>
            </div>
            <div class="modal-footer">
                <button class="btn-footer-cancel" type="button" onclick={closeConfirmModal}>
                    ✕ Annuler
                </button>
                <button class={confirmBtnClass} type="button" onclick={confirmAction}>
                    ✔ Confirmer
                </button>
            </div>
        </div>
    </template>

</template>
