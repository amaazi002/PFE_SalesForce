<!-- force-app/main/default/lwc/srApplyForm/srApplyForm.html -->
<template>
  <div class="apply-page">

    <!-- ── En-tête ── -->
    <div class="apply-header">
      <h1 class="apply-title">Formulaire de candidature</h1>
      <template if:true={offerName}>
        <p class="apply-subtitle">Offre : <strong>{offerName}</strong></p>
      </template>
    </div>

    <!-- ── Stepper ── -->
    <div class="stepper">
      <div class={stepClass1}>
        <div class="step-circle">1</div>
        <span class="step-label">Informations personnelles</span>
      </div>
      <div class="step-line"></div>
      <div class={stepClass2}>
        <div class="step-circle">2</div>
        <span class="step-label">Compétences</span>
      </div>
      <div class="step-line"></div>
      <div class={stepClass3}>
        <div class="step-circle">3</div>
        <span class="step-label">Confirmation</span>
      </div>
    </div>

    <div class="apply-body">

      <template if:true={isSubmitting}>
        <lightning-spinner alternative-text="Traitement..." size="small"></lightning-spinner>
      </template>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- ── ÉTAPE 1 : Informations personnelles + CV ───────── -->
      <!-- ══════════════════════════════════════════════════════ -->
      <template if:true={isStep1}>

        <!-- Identité -->
        <div class="section">
          <h2 class="section-title">Identité</h2>
          <div class="form-grid">
            <lightning-input
              type="text"
              label="Prénom"
              value={firstName}
              onchange={onFirst}
              required>
            </lightning-input>
            <lightning-input
              type="text"
              label="Nom"
              value={lastName}
              onchange={onLast}
              required>
            </lightning-input>
            <lightning-input
              type="email"
              label="Email"
              value={email}
              onchange={onEmail}
              required>
            </lightning-input>
            <lightning-input
              type="tel"
              label="Téléphone"
              value={Phone}
              onchange={onTelephone}>
            </lightning-input>
            <lightning-input
              type="date"
              label="Date de naissance"
              value={dateNaissance}
              onchange={onDateNaissance}>
            </lightning-input>
            <lightning-combobox
              label="Sexe"
              value={sexe}
              options={genderOptions}
              onchange={onSexe}>
            </lightning-combobox>
            <lightning-combobox
              label="Situation familiale"
              value={situationFamiliale}
              options={situationOptions}
              onchange={onSituationFamiliale}
              class="full-width">
            </lightning-combobox>
          </div>
        </div>

        <!-- Upload CV -->
        <div class="section">
          <h2 class="section-title">Déposer votre CV</h2>
          <div class="file-upload-wrapper">
            <label class="file-label">
              📎 Choisir un CV (PDF / DOC / DOCX, max 5 Mo)
              <input
                type="file"
                accept=".pdf,.doc,.docx"
                class="file-input"
                onchange={onFileChange}>
            </label>
            <template if:true={fileName}>
              <p class="file-name">📄 {fileName}</p>
            </template>
          </div>
          <template if:true={uploadingCv}>
            <lightning-spinner alternative-text="Upload en cours..." size="small"></lightning-spinner>
          </template>
          <template if:true={cvUploaded}>
            <div class="success-msg">✅ CV déposé avec succès !</div>
          </template>
        </div>

        <!-- Erreur -->
        <template if:true={lastError}>
          <div class="alert-error">{lastError}</div>
        </template>

        <!-- Boutons -->
        <div class="form-actions">
          <lightning-button
            label="Annuler"
            onclick={goBack}>
          </lightning-button>
          <lightning-button
            variant="brand"
            label="Suivant →"
            onclick={goStep2}>
          </lightning-button>
        </div>

      </template>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- ── ÉTAPE 2 : Compétences & Formation ──────────────── -->
      <!-- ══════════════════════════════════════════════════════ -->
      <template if:true={isStep2}>

        <!-- Compétences -->
        <div class="section">
          <h2 class="section-title">Compétences & Expérience</h2>
          <div class="form-grid">
            <lightning-input
              type="number"
              label="Années d'expérience"
              value={anneesExperience}
              onchange={onAnneesExperience}
              min="0"
              step="1"
              class="full-width">
            </lightning-input>
            <lightning-textarea
              label="Compétences techniques"
              value={tech}
              onchange={onTech}
              required
              class="full-width">
            </lightning-textarea>
            <lightning-textarea
              label="Expérience professionnelle"
              value={xp}
              onchange={onXp}
              required
              class="full-width">
            </lightning-textarea>
            <lightning-textarea
              label="Compétences personnelles"
              value={soft}
              onchange={onSoft}
              required
              class="full-width">
            </lightning-textarea>
          </div>
        </div>

        <!-- Formation -->
        <div class="section">
          <h2 class="section-title">Formation</h2>
          <div class="form-grid">
            <lightning-combobox
              label="Niveau d'étude"
              value={niveauEtude}
              options={niveauEtudeOptions}
              onchange={onNiveauEtude}
              class="full-width">
            </lightning-combobox>
            <lightning-input
              type="text"
              label="Dernier diplôme"
              value={dernierDiplome}
              onchange={onDernierDiplome}>
            </lightning-input>
            <lightning-input
              type="text"
              label="École / Université"
              value={ecoleUniversite}
              onchange={onEcoleUniversite}>
            </lightning-input>
            <lightning-input
              type="number"
              label="Année d'obtention"
              value={anneeObtention}
              onchange={onAnneeObtention}
              min="1950"
              max="2100"
              step="1">
            </lightning-input>
          </div>
        </div>

        <!-- Erreur -->
        <template if:true={lastError}>
          <div class="alert-error">{lastError}</div>
        </template>

        <!-- Boutons -->
        <div class="form-actions">
          <lightning-button
            label="← Retour"
            onclick={goStep1}>
          </lightning-button>
          <lightning-button
            variant="brand"
            label="Soumettre ma candidature"
            onclick={submit}
            disabled={isSubmitting}>
          </lightning-button>
        </div>

      </template>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- ── ÉTAPE 3 : Confirmation ──────────────────────────── -->
      <!-- ══════════════════════════════════════════════════════ -->
      <template if:true={isStep3}>
        <div class="section confirmation">
          <div class="confirm-icon">🎉</div>
          <h2 class="confirm-title">Candidature envoyée !</h2>
          <p class="confirm-msg">
            Merci <strong>{firstName} {lastName}</strong>,
            votre candidature pour l'offre
            <strong>{offerName}</strong>
            a bien été enregistrée.
          </p>
          <template if:true={cvUploaded}>
            <p class="confirm-cv">📄 Votre CV a bien été déposé.</p>
          </template>
        </div>
        <div class="form-actions center">
          <lightning-button
            variant="brand"
            label="Retour aux Home"
            onclick={goBack}>
          </lightning-button>
        </div>
      </template>

    </div>
  </div>
</template>
