<template>
    <article class="offer-card" onclick={view}>

        <header class="offer-card__head">
            <h2 class="offer-card__title">{titreText}</h2>
            <div class={deadlineClass}>{deadlineText}</div>
        </header>

        <section class="offer-card__section">
            <div class="offer-card__label">
                <lightning-icon
                    icon-name="utility:description"
                    size="xx-small"
                    class="slds-m-right_xx-small">
                </lightning-icon>
                Description
            </div>
            <p class="offer-card__text offer-card__text--clamp">
                {descriptionText}
            </p>
        </section>

        <section class="offer-card__section">
            <div class="offer-card__label">
                <lightning-icon
                    icon-name="utility:office365"
                    size="xx-small"
                    class="slds-m-right_xx-small">
                </lightning-icon>
                Département
            </div>
            <p class="offer-card__text">{departementText}</p>
        </section>

        <section class="offer-card__section">
            <div class="offer-card__label">
                <lightning-icon
                    icon-name="utility:location"
                    size="xx-small"
                    class="slds-m-right_xx-small">
                </lightning-icon>
                Localisation
            </div>
            <p class="offer-card__text">{localisationText}</p>
        </section>

        <div class="offer-card__footer">
            <span class="offer-card__cta">Voir le détail →</span>
        </div>

    </article>
</template>
