<template>
    <div class="rec-container">

        <!-- Header -->
        <div class="rec-header">
            <div class="rec-header-left">
                <template if:true={hasOffreContext}>
                    <button class="btn-back" onclick={handleBack}>
                        ← Retour
                    </button>
                </template>
                <div class="rec-header-icon">📋</div>
                <div>
                    <h1 class="rec-title">{pageTitle}</h1>
                    <p class="rec-subtitle">{totalCandidatures} candidature(s)</p>
                </div>
            </div>
        </div>

        <!-- Filtres -->
        <div class="rec-filters">
            <div class="rec-filters-left">
                <div class="search-box">
                    <input
                        type="text"
                        class="search-input"
                        placeholder="🔍 Rechercher un candidat..."
                        value={searchTerm}
                        onchange={handleSearch} />
                </div>
                <div class="filter-group">
                    <button class={btnTousClass} data-filter="Tous" onclick={handleFilterStatut}>
                        Tous
                    </button>
                    <button class={btnSoumiseClass} data-filter="Soumise" onclick={handleFilterStatut}>
                        Soumise
                    </button>
                    <button class={btnEntretienClass} data-filter="entretien" onclick={handleFilterStatut}>
                        En entretien
                    </button>
                    <button class={btnSansEntretienClass} data-filter="sansEntretien" onclick={handleFilterStatut}>
                        Sans entretien
                    </button>
                </div>
            </div>
            <div class="rec-filters-right">
                <div class="sort-group">
                    <span class="sort-label">Score :</span>
                    <button class={sortDescClass} data-order="desc" onclick={handleSortToggle}
                            title="Score décroissant (meilleurs en premier)">
                        ↓ Meilleur
                    </button>
                    <button class={sortAscClass} data-order="asc" onclick={handleSortToggle}
                            title="Score croissant (plus faibles en premier)">
                        ↑ Plus faible
                    </button>
                </div>
            </div>
        </div>

        <!-- Barre de sélection -->
        <template if:true={hasSelected}>
            <div class="selection-bar">
                <div class="selection-info">
                    <span class="selection-dot"></span>
                    <span>{selectedCount} sélectionné(s)</span>
                </div>
                <button class="btn-action-group" onclick={handleOpenActionModal}>
                    ⚡ Action groupée
                </button>
            </div>
        </template>

        <!-- Tableau -->
        <template if:true={hasCandidatures}>
            <div class="rec-table-wrapper">
                <table class="rec-table">
                    <thead>
                        <tr>
                            <th class="th-check">
                                <input type="checkbox"
                                       checked={allSelected}
                                       onchange={handleSelectAll} />
                            </th>
                            <th class="th-candidat">Candidat</th>
                            <template if:false={hasOffreContext}>
                                <th class="th-offre">Offre</th>
                            </template>
                            <th class="th-center">Statut</th>
                            <th class="th-center">Décision</th>
                            <th class="th-center">Score</th>
                            <th class="th-center">Date</th>
                            <th class="th-center">CV</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={candidatures} for:item="cand">
                            <tr key={cand.Id} class="table-row">

                                <!-- Checkbox -->
                                <td class="td-check">
                                    <input type="checkbox"
                                           data-id={cand.Id}
                                           checked={cand.isSelected}
                                           onchange={handleSelectOne} />
                                </td>

                                <!-- Candidat -->
                                <td class="td-candidat">
                                    <div class="candidat-cell"
                                         data-id={cand.Id}
                                         onclick={handleCandidatClick}>
                                        <div class="avatar">{cand.initiales}</div>
                                        <span class="candidat-name">{cand.candidateName}</span>
                                    </div>
                                </td>

                                <!-- Offre (masquée si contexte offre) -->
                                <template if:false={hasOffreContext}>
                                    <td class="td-offre-name">{cand.offreTitre}</td>
                                </template>

                                <!-- Statut -->
                                <td class="td-center">
                                    <span class={cand.statutClass}>{cand.Statut__c}</span>
                                </td>

                                <!-- Décision -->
                                <td class="td-center">
                                    <template if:true={cand.hasDecision}>
                                        <span class={cand.decisionClass}>{cand.Decision__c}</span>
                                    </template>
                                    <template if:false={cand.hasDecision}>
                                        <span class="badge-decision badge-en-cours">—</span>
                                    </template>
                                </td>

                                <!-- Score -->
                                <td class="td-center">
                                    <div class="score-wrapper">
                                        <div class="score-track">
                                            <div class={cand.scoreBarClass}
                                                 style={cand.scoreBarStyle}></div>
                                        </div>
                                        <span class="score-value">{cand.Score_Matching__c}%</span>
                                    </div>
                                </td>

                                <!-- Date -->
                                <td class="td-center td-date">{cand.dateFmt}</td>

                                <!-- CV -->
                                <td class="td-center">
                                    <template if:true={cand.hasCv}>
                                        <a href={cand.CV_Public_URL__c}
                                           target="_blank"
                                           class="cv-link">📄 CV</a>
                                    </template>
                                    <template if:false={cand.hasCv}>
                                        <span class="no-cv">—</span>
                                    </template>
                                </td>

                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <!-- État vide -->
        <template if:false={hasCandidatures}>
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <p class="empty-text">Aucune candidature trouvée.</p>
            </div>
        </template>

        <!-- ══════════════════════════════════════════════ -->
        <!-- Modale Action Groupée -->
        <!-- ══════════════════════════════════════════════ -->
        <template if:true={isActionModalOpen}>
            <div class="modal-backdrop" onclick={closeActionModal}></div>
            <div class="modal-box" onclick={stopPropagation}>
                <div class="modal-header">
                    <h2 class="modal-title">⚡ Action groupée</h2>
                    <button class="modal-close" onclick={closeActionModal}>✕</button>
                </div>
                <div class="modal-body">
                    <table class="modal-table">
                        <thead>
                            <tr>
                                <th>Candidat</th>
                                <th>Nouveau statut</th>
                                <th>Décision</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={selectedCandidatures} for:item="sel">
                                <tr key={sel.Id}>
                                    <td class="modal-td-name">{sel.candidateName}</td>
                                    <td>
                                        <select class="modal-select"
                                                data-id={sel.Id}
                                                onchange={handleNewStatutChange}>
                                            <option value="">— Inchangé —</option>
                                            <template for:each={statutOptions} for:item="opt">
                                                <option key={opt.value} value={opt.value}>
                                                    {opt.label}
                                                </option>
                                            </template>
                                        </select>
                                    </td>
                                    <td>
                                        <select class="modal-select"
                                                data-id={sel.Id}
                                                onchange={handleDecisionChange}>
                                            <option value="">— Inchangé —</option>
                                            <template for:each={decisionOptions} for:item="opt">
                                                <option key={opt.value} value={opt.value}>
                                                    {opt.label}
                                                </option>
                                            </template>
                                        </select>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" onclick={closeActionModal}>Annuler</button>
                    <button class="btn-save" onclick={handleSaveActions}>✅ Enregistrer</button>
                </div>
            </div>
        </template>

    </div>
</template>
