<template>
    <div class="rec-container">

        <!-- Header -->
        <div class="rec-header">
            <button class="btn-back" onclick={handleBack}>← Retour</button>
            <div class="rec-header-info">
                <h1 class="rec-title">
                    Toutes les candidatures
                    <template if:true={offreTitre}>
                        — {offreTitre}
                    </template>
                </h1>
                <p class="rec-subtitle">{totalCandidatures} candidature(s)</p>
            </div>
        </div>

        <!-- Filtres -->
        <div class="filters-bar">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    class="search-input"
                    placeholder="Rechercher par nom..."
                    value={searchTerm}
                    oninput={handleSearch}
                />
            </div>
            <div class="filter-buttons">
                <button
                    class={btnTousClass}
                    data-filter="Tous"
                    onclick={handleFilterStatut}>
                    Tous
                </button>
                <button
                    class={btnSoumiseClass}
                    data-filter="Soumise"
                    onclick={handleFilterStatut}>
                    Soumise
                </button>
                <button
                    class={btnEntretienClass}
                    data-filter="entretien"
                    onclick={handleFilterStatut}>
                    En entretien
                </button>
                <button
                    class={btnSansEntretienClass}
                    data-filter="sansEntretien"
                    onclick={handleFilterStatut}>
                    Sans entretien
                </button>
            </div>
        </div>

        <!-- Barre sélection -->
        <template if:true={hasSelected}>
            <div class="selected-bar">
                <div class="selected-info">
                    <span class="selected-dot"></span>
                    <span>{selectedCount} candidat(s) sélectionné(s)</span>
                </div>
                <button
                    class="btn-action-group"
                    onclick={handleOpenActionModal}>
                    ⚡ Action groupée
                </button>
            </div>
        </template>

        <!-- Tableau -->
        <div class="rec-table-wrapper">
            <template if:true={hasCandidatures}>
                <table class="rec-table">
                    <thead>
                        <tr>
                            <th style="width:44px">
                                <input
                                    type="checkbox"
                                    class="checkbox-input"
                                    checked={allSelected}
                                    onchange={handleSelectAll}
                                />
                            </th>
                            <th>Candidat</th>
                            <th>Offre</th>
                            <th>Statut</th>
                            <th>Décision</th>
                            <th>Score</th>
                            <th>Date candidature</th>
                            <th>CV</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={candidatures} for:item="cand">
                            <tr key={cand.Id} class="table-row">
                                <td>
                                    <input
                                        type="checkbox"
                                        class="checkbox-input"
                                        checked={cand.isSelected}
                                        data-id={cand.Id}
                                        onchange={handleSelectOne}
                                    />
                                </td>
                                <!-- Candidat -->
                                <td>
                                    <div class="candidat-cell">
                                        <div class="candidat-avatar">
                                            {cand.initiales}
                                        </div>
                                        <button
                                            class="candidat-name-link"
                                            data-id={cand.Id}
                                            onclick={handleCandidatClick}>
                                            {cand.candidateName}
                                        </button>
                                    </div>
                                </td>
                                <!-- Offre -->
                                <td>
                                    <span class="offre-label">
                                        {cand.offreTitre}
                                    </span>
                                </td>
                                <!-- Statut -->
                                <td>
                                    <span class={cand.statutClass}>
                                        {cand.Statut__c}
                                    </span>
                                </td>
                                <!-- ✅ Décision -->
                                <td>
                                    <template if:true={cand.hasDecision}>
                                        <span class={cand.decisionClass}>
                                            {cand.Decision__c}
                                        </span>
                                    </template>
                                    <template if:false={cand.hasDecision}>
                                        <span class="text-muted">—</span>
                                    </template>
                                </td>
                                <!-- Score -->
                                <td>
                                    <div class="score-bar-wrap">
                                        <div class="score-bar-bg">
                                            <div
                                                class={cand.scoreBarClass}
                                                style={cand.scoreBarStyle}>
                                            </div>
                                        </div>
                                        <span class="score-label">
                                            {cand.Score_Matching__c}%
                                        </span>
                                    </div>
                                </td>
                                <!-- Date -->
                                <td>
                                    <span class="date-label">
                                        {cand.dateFmt}
                                    </span>
                                </td>
                                <!-- CV -->
                                <td>
                                    <template if:true={cand.hasCv}>
                                        <a
                                            href={cand.CV_Public_URL__c}
                                            target="_blank"
                                            class="cv-link">
                                            📄 CV
                                        </a>
                                    </template>
                                    <template if:false={cand.hasCv}>
                                        <span class="text-muted">—</span>
                                    </template>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>

            <template if:false={hasCandidatures}>
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>Aucune candidature trouvée.</p>
                </div>
            </template>
        </div>

        <!-- ══════════════════════════════════════════════ -->
        <!-- Modale Action Groupée                          -->
        <!-- ══════════════════════════════════════════════ -->
        <template if:true={isActionModalOpen}>
            <div class="modal-backdrop" onclick={closeActionModal}></div>
            <div class="modal-box modal-large">
                <div class="modal-header">
                    <div class="modal-header-content">
                        <span class="modal-header-icon">⚡</span>
                        <div>
                            <h2 class="modal-title">Action groupée</h2>
                            <p class="modal-subtitle">
                                {selectedCount} candidat(s) sélectionné(s)
                            </p>
                        </div>
                    </div>
                    <button
                        class="modal-close"
                        onclick={closeActionModal}>✕
                    </button>
                </div>
                <div class="modal-body">
                    <table class="rec-table inner-table">
                        <thead>
                            <tr>
                                <th>Candidat</th>
                                <th>Statut actuel</th>
                                <th>Nouveau statut</th>
                                <th>Décision</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template
                                for:each={selectedCandidatures}
                                for:item="cand">
                                <tr key={cand.Id} class="table-row">
                                    <td>
                                        <div class="candidat-cell">
                                            <div class="candidat-avatar">
                                                {cand.initiales}
                                            </div>
                                            <span class="candidat-name-text">
                                                {cand.candidateName}
                                            </span>
                                        </div>
                                    </td>
                                    <td>
                                        <span class={cand.statutClass}>
                                            {cand.Statut__c}
                                        </span>
                                    </td>
                                    <td>
                                        <select
                                            class="select-styled"
                                            data-id={cand.Id}
                                            onchange={handleNewStatutChange}>
                                            <option value="">
                                                -- Choisir --
                                            </option>
                                            <template
                                                for:each={statutOptions}
                                                for:item="opt">
                                                <option
                                                    key={opt.value}
                                                    value={opt.value}>
                                                    {opt.label}
                                                </option>
                                            </template>
                                        </select>
                                    </td>
                                    <td>
                                        <select
                                            class="select-styled"
                                            data-id={cand.Id}
                                            onchange={handleDecisionChange}>
                                            <option value="">
                                                -- Choisir --
                                            </option>
                                            <template
                                                for:each={decisionOptions}
                                                for:item="opt">
                                                <option
                                                    key={opt.value}
                                                    value={opt.value}>
                                                    {opt.label}
                                                </option>
                                            </template>
                                        </select>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button
                        class="btn-cancel"
                        onclick={closeActionModal}>
                        Annuler
                    </button>
                    <button
                        class="btn-save"
                        onclick={handleSaveActions}>
                        ✅ Enregistrer
                    </button>
                </div>
            </div>
        </template>

    </div>
</template>
