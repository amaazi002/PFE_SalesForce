<template>
    <div class="header">
        <template if:true={isGuest}>
            <div class="spacer"></div>
            <div class="actions">
                <div class="hero">
                    <lightning-button 
                        class="slds-m-left_small"
                        label="S'inscrire"
                        variant="brand"
                        onclick={goRegister}>
                    </lightning-button>
                    <lightning-button
                        class="slds-m-left_small"
                        variant="brand"
                        label="Se connecter"
                        onclick={goLogin}>
                    </lightning-button>
                </div>
            </div>
        </template>
        <template if:false={isGuest}>
            <div class="spacer"></div>
            <div class="person">
                <div class="actions">
                    <lightning-button-menu
                        alternative-text="Mon compte"
                        icon-name="utility:user"
                        menu-alignment="right"
                        onselect={onMenu}>
                        <lightning-menu-item value="profile" label="Mon profil"></lightning-menu-item>
                        <lightning-menu-item value="logout"  label="Se déconnecter"></lightning-menu-item>
                    </lightning-button-menu>
                </div>
            </div>
        </template>
    </div>
</template>
