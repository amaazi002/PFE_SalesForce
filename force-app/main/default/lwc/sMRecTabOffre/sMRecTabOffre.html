<template>
    <div class="rec-container">

        <div class="rec-header">
            <h1 class="rec-title">Offres d'emploi</h1>
        </div>

        <div class="rec-table-wrapper">
            <table class="rec-table">
                <thead>
                    <tr>
                        <th>Offre</th>
                        <th>New Submissions</th>
                        <th>En attente d'entretien</th>
                        <th>Entretien planifié</th>
                        <th>Total candidats</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template if:true={hasRows}>
                        <template for:each={rows} for:item="row">
                            <tr key={row.offreId}>
                                <td>
                                    <div class="offre-titre">{row.offre.Titre__c}</div>
                                    <div class="offre-meta">
                                        <span>{row.deadlineFmt}</span>
                                        <span class="sep">·</span>
                                        <span>{row.offre.Localisation__c}</span>
                                        <span class="sep">·</span>
                                        <span class={row.statutClass}>
                                            {row.offre.Statut__c}
                                        </span>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge badge-new">
                                        {row.newSubmissions}
                                    </span>
                                </td>
                                <td>
                                    <span class="badge badge-wait">
                                        {row.enAttenteEntretien}
                                    </span>
                                </td>
                                <td>
                                    <span class="badge badge-planned">
                                        {row.entretienPlanifie}
                                    </span>
                                </td>
                                <td>
                                    <button
                                        class="total-link"
                                        data-id={row.offreId}
                                        data-titre={row.offre.Titre__c}
                                        onclick={handleTotalClick}>
                                        {row.totalCandidats}
                                    </button>
                                </td>
                                <td>
                                    <button
                                        class="btn-edit"
                                        data-id={row.offreId}
                                        onclick={handleEdit}>
                                        Modifier
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </template>
                    <template if:false={hasRows}>
                        <tr>
                            <td colspan="6" class="empty-state">
                                Aucune offre trouvée.
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- ══════════════════════════════════════════════ -->
        <!-- Modale Candidatures                            -->
        <!-- ══════════════════════════════════════════════ -->
        <template if:true={isModalOpen}>
            <div class="modal-backdrop" onclick={closeModal}></div>
            <div class="modal-box modal-large">
                <div class="modal-header">
                    <h2>Candidatures — {modalOfferTitle}</h2>
                    <button class="modal-close" onclick={closeModal}>✕</button>
                </div>
                <div class="modal-body">

                    <div class="modal-filters">
                        <input
                            type="text"
                            class="search-input"
                            placeholder="Rechercher par nom..."
                            value={searchTerm}
                            oninput={handleSearch}
                        />
                        <div class="filter-buttons">
                            <button
                                class={btnEntretienClass}
                                onclick={handleFilterEntretien}>
                                Entretien planifié
                            </button>
                            <button
                                class={btnSansEntretienClass}
                                onclick={handleFilterSansEntretien}>
                                Sans entretien
                            </button>
                            <button
                                class={btnNouveauxClass}
                                onclick={handleFilterNouveaux}>
                                Nouveaux
                            </button>
                        </div>
                    </div>

                    <template if:true={hasSelected}>
                        <div class="candidats-selected-bar">
                            <span>{selectedCount} candidat(s) sélectionné(s)</span>
                            <button
                                class="btn-action-group"
                                onclick={handleOpenActionModal}>
                                Action groupée
                            </button>
                        </div>
                    </template>

                    <template if:true={hasCandidatures}>
                        <table class="rec-table">
                            <thead>
                                <tr>
                                    <th style="width:40px">
                                        <input
                                            type="checkbox"
                                            checked={allSelected}
                                            onchange={handleSelectAll}
                                        />
                                    </th>
                                    <th>Nom du candidat</th>
                                    <th>Statut</th>
                                    <th>Score</th>
                                    <th>CV</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={filteredCandidatures} for:item="cand">
                                    <tr key={cand.Id}>
                                        <td>
                                            <input
                                                type="checkbox"
                                                checked={cand.isSelected}
                                                data-id={cand.Id}
                                                onchange={handleSelectOne}
                                            />
                                        </td>
                                        <td>
                                            <button
                                                class="candidat-name-link"
                                                data-id={cand.Id}
                                                onclick={handleCandidatClick}>
                                                {cand.candidateName}
                                            </button>
                                        </td>
                                        <td>
                                            <span class={cand.statutClass}>
                                                {cand.Statut__c}
                                            </span>
                                        </td>
                                        <td>
                                            <div class="score-bar-wrap">
                                                <div class="score-bar-bg">
                                                    <div
                                                        class={cand.scoreBarClass}
                                                        style={cand.scoreBarStyle}>
                                                    </div>
                                                </div>
                                                <span class="score-label">
                                                    {cand.Score_Matching__c}%
                                                </span>
                                            </div>
                                        </td>
                                        <td>
                                            <template if:true={cand.hasCv}>
                                                <a href={cand.CV_Public_URL__c}
                                                   target="_blank"
                                                   class="cv-link">
                                                    Voir CV
                                                </a>
                                            </template>
                                            <template if:false={cand.hasCv}>
                                                <span class="text-muted">—</span>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>

                    <template if:false={hasCandidatures}>
                        <div class="empty-state">Aucune candidature.</div>
                    </template>
                </div>
            </div>
        </template>

        <!-- ══════════════════════════════════════════════ -->
        <!-- Modale Action Groupée                          -->
        <!-- ══════════════════════════════════════════════ -->
        <template if:true={isActionModalOpen}>
            <div class="modal-backdrop" onclick={closeActionModal}></div>
            <div class="modal-box modal-large">
                <div class="modal-header">
                    <h2>Action groupée</h2>
                    <button class="modal-close" onclick={closeActionModal}>✕</button>
                </div>
                <div class="modal-body">
                    <table class="rec-table">
                        <thead>
                            <tr>
                                <th>Nom du candidat</th>
                                <th>Statut actuel</th>
                                <th>Nouveau statut</th>
                                <th>Décision</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={selectedCandidatures} for:item="cand">
                                <tr key={cand.Id}>
                                    <td>{cand.candidateName}</td>
                                    <td>
                                        <span class={cand.statutClass}>
                                            {cand.Statut__c}
                                        </span>
                                    </td>
                                    <td>
                                        <select
                                            class="select-statut"
                                            data-id={cand.Id}
                                            onchange={handleNewStatutChange}>
                                            <option value="">-- Choisir --</option>
                                            <option value="Soumise">Soumise</option>
                                            <option value="En entretien">
                                                En entretien
                                            </option>
                                            <option value="Sans entretien">
                                                Sans entretien
                                            </option>
                                        </select>
                                    </td>
                                    <td>
                                        <select
                                            class="select-decision"
                                            data-id={cand.Id}
                                            onchange={handleDecisionChange}>
                                            <option value="">-- Choisir --</option>
                                            <option value="Accepté">Accepté</option>
                                            <option value="Refusé">Refusé</option>
                                        </select>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" onclick={closeActionModal}>
                        Annuler
                    </button>
                    <button class="btn-save" onclick={handleSaveActions}>
                        Enregistrer
                    </button>
                </div>
            </div>
        </template>

        <!-- ══════════════════════════════════════════════ -->
        <!-- Modale Edition Offre                           -->
        <!-- ══════════════════════════════════════════════ -->
        <template if:true={isEditModalOpen}>
            <div class="modal-backdrop" onclick={closeEditModal}></div>
            <div class="modal-box">
                <div class="modal-header">
                    <h2>Modifier — {editOfferTitle}</h2>
                    <button class="modal-close" onclick={closeEditModal}>✕</button>
                </div>
                <div class="modal-body">
                    <lightning-record-edit-form
                        object-api-name="Offre__c"
                        record-id={editRecordId}
                        onsubmit={handleEditSubmit}
                        onsuccess={handleEditSuccess}
                        onerror={handleEditError}>

                        <lightning-messages></lightning-messages>

                        <div class="form-grid">
                            <lightning-input-field
                                field-name="Titre__c" required>
                            </lightning-input-field>
                            <lightning-input-field
                                field-name="Departement__c" required>
                            </lightning-input-field>
                            <lightning-input-field
                                field-name="Localisation__c" required>
                            </lightning-input-field>
                            <lightning-input-field
                                field-name="Deadline__c" required>
                            </lightning-input-field>
                            <lightning-input-field
                                field-name="Statut__c" required>
                            </lightning-input-field>
                            <lightning-input-field
                                field-name="TypeOffre__c" required>
                            </lightning-input-field>
                            <lightning-input-field
                                field-name="Description__c">
                            </lightning-input-field>
                            <lightning-input-field
                                field-name="CompetencesRequises__c">
                            </lightning-input-field>
                        </div>

                        <div class="modal-footer">
                            <button class="btn-cancel" onclick={closeEditModal}>
                                Annuler
                            </button>
                            <lightning-button
                                variant="brand"
                                label="Enregistrer"
                                type="submit">
                            </lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </template>

    </div>
</template>
