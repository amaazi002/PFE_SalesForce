<template>
    <div class="rec-container">

        <!-- Header -->
        <div class="rec-header">
            <div class="rec-header-left">
                <div class="rec-header-icon"></div>
                <div>
                    <h1 class="rec-title">Offres d'emploi</h1>
                    <p class="rec-subtitle">{totalOffres} offre(s)</p>
                </div>
            </div>
        </div>

        <!-- Tableau -->
        <div class="rec-table-wrapper">
            <table class="rec-table">
                <thead>
                    <tr>
                        <th class="th-offre">Offre</th>
                        <th class="th-center">
                            <div class="th-inner">New</div>
                        </th>
                        <th class="th-center">
                            <div class="th-inner">Soumise</div>
                        </th>
                        <th class="th-center">
                            <div class="th-inner">En attente</div>
                        </th>
                        <th class="th-center">
                            <div class="th-inner">Entretien</div>
                        </th>
                        <th class="th-center">
                            <div class="th-inner">Total</div>
                        </th>
                        <th class="th-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template if:true={hasRows}>
                        <template for:each={rows} for:item="row">
                            <tr key={row.offreId} class="table-row">

                                <!-- Offre -->
                                <td class="td-offre">
                                    <div class="offre-titre">
                                        {row.offre.Titre__c}
                                    </div>
                                    <div class="offre-meta">
                                        <span class="meta-chip">
                                            {row.offre.Localisation__c}
                                        </span>
                                        <span class="meta-chip">
                                            {row.deadlineFmt}
                                        </span>
                                        <span class={row.statutClass}>
                                            {row.offre.Statut__c}
                                        </span>
                                    </div>
                                </td>

                                <!-- New Submissions -->
                                <td class="td-center">
                                    <div class="stat-pill stat-new">
                                        {row.newSubmissions}
                                    </div>
                                </td>

                                <!-- Soumise -->
                                <td class="td-center">
                                    <div class="stat-pill stat-soumise">
                                        {row.soumiseCandidats}
                                    </div>
                                </td>

                                <!-- En attente -->
                                <td class="td-center">
                                    <div class="stat-pill stat-wait">
                                        {row.enAttenteEntretien}
                                    </div>
                                </td>

                                <!-- Entretien planifié -->
                                <td class="td-center">
                                    <div class="stat-pill stat-planned">
                                        {row.entretienPlanifie}
                                    </div>
                                </td>

                                <!-- Total -->
                                <td class="td-center">
                                    <button
                                        class="total-btn"
                                        data-id={row.offreId}
                                        data-titre={row.offre.Titre__c}
                                        onclick={handleTotalClick}>
                                        <span class="total-number">
                                            {row.totalCandidats}
                                        </span>
                                        <span class="total-sub">voir →</span>
                                    </button>
                                </td>

                                <!-- Actions -->
                                <td class="td-center">
                                    <button
                                        class="btn-edit"
                                        data-id={row.offreId}
                                        data-titre={row.offre.Titre__c}
                                        onclick={handleEdit}>
                                        Modifier
                                    </button>
                                </td>

                            </tr>
                        </template>
                    </template>

                    <template if:false={hasRows}>
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <div class="empty-icon">📭</div>
                                    <p>Aucune offre trouvée.</p>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- ══════════════════════════════════════════════ -->
        <!-- Modale Modifier Offre -->
        <!-- ══════════════════════════════════════════════ -->
        <template if:true={isEditModalOpen}>
            <div onclick={closeEditModal} class="modal-backdrop"></div>
            <div class="modal-box modal-edit" onclick={stopPropagation}>
                <div class="modal-header">
                    <div class="modal-header-content">
                        <div class="modal-header-icon"></div>
                        <div>
                            <h2 class="modal-title">Modifier l'offre</h2>
                            <p class="modal-subtitle">{editOfferTitle}</p>
                        </div>
                    </div>
                    <button class="modal-close" onclick={closeEditModal}>✕</button>
                </div>

                <div class="modal-body">
                    <lightning-record-edit-form
                        object-api-name="Offre__c"
                        record-id={editRecordId}
                        onsuccess={handleEditSuccess}
                        onerror={handleEditError}>

                        <lightning-messages></lightning-messages>

                        <div class="form-section">
                            <p class="form-section-title"></p>
                            <div class="form-grid">
                                <lightning-input-field field-name="Titre__c" required>
                                </lightning-input-field>
                                <lightning-input-field field-name="Departement__c" required>
                                </lightning-input-field>
                                <lightning-input-field field-name="Localisation__c" required>
                                </lightning-input-field>
                                <lightning-input-field field-name="Deadline__c" required>
                                </lightning-input-field>
                            </div>
                        </div>

                        <div class="form-section">
                            <p class="form-section-title"></p>
                            <div class="form-grid">
                                <lightning-input-field field-name="Statut__c" required>
                                </lightning-input-field>
                                <lightning-input-field field-name="TypeOffre__c" required>
                                </lightning-input-field>
                            </div>
                        </div>

                        <div class="form-section">
                            <p class="form-section-title"></p>
                            <div class="form-grid-full">
                                <lightning-input-field field-name="Description__c">
                                </lightning-input-field>
                                <lightning-input-field field-name="CompetencesRequises__c">
                                </lightning-input-field>
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button
                                class="btn-footer-cancel"
                                type="button"
                                onclick={closeEditModal}>
                                ✕ Annuler
                            </button>
                            <lightning-button
                                variant="brand"
                                label="Enregistrer"
                                type="submit"
                                class="btn-lwc-save">
                            </lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </template>

    </div>
</template>
