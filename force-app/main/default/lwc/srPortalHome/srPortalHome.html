<template>
    <div class="page">

        <!-- Chargement -->
        <template if:true={loadingOffers}>
            <div class="loading-wrapper">
                <lightning-spinner
                    alternative-text="Chargement des offres..."
                    size="medium">
                </lightning-spinner>
            </div>
        </template>

        <!-- Contenu -->
        <template if:false={loadingOffers}>
            <template if:true={hasOffers}>

                <div class="page-header">
                    <h1 class="page-title">Nos offres d'emploi</h1>
                    <p class="page-subtitle">
                        {offersCount} offre(s) disponible(s)
                    </p>
                </div>

                <div class="grid">
                    <template for:each={offers} for:item="o">
                        <c-sr-offer-tile
                            key={o.Id}
                            offer={o}
                            onviewdetail={handleViewDetail}>
                        </c-sr-offer-tile>
                    </template>
                </div>

            </template>

            <template if:false={hasOffers}>
                <div class="empty-state">
                    <lightning-icon
                        icon-name="utility:search"
                        size="large">
                    </lightning-icon>
                    <p class="empty-title">Aucune offre disponible</p>
                    <p class="empty-text">
                        Revenez bientôt, de nouvelles offres
                        seront publiées prochainement.
                    </p>
                </div>
            </template>
        </template>

    </div>
</template>
