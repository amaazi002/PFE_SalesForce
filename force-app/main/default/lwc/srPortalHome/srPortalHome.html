<template>
  <div class="page">
    <div class="topbar">
      <template if:false={isGuest}>
        <div class="welcome">Bienvenue, {userFullName}</div>
      </template>
    </div>

    <template if:true={loadingOffers}>
      <div class="loading">Chargement…</div>
    </template>

    <template if:false={loadingOffers}>
      <template if:true={hasOffers}>
        <div class="grid">
          <template for:each={offers} for:item="o">
            <c-sr-offer-tile key={o.Id} offer={o} onviewdetail={handleViewDetail}></c-sr-offer-tile>
          </template>
        </div>
      </template>
      <template if:false={hasOffers}>
        <div class="empty">Aucune offre disponible pour le moment.</div>
      </template>
    </template>

    <template if:true={selectedOfferId}>
      <div class="overlay" role="dialog" aria-modal="true" onclick={closeDetail}>
        <div class="overlay__card" onclick={stop}>
          <c-sr-offer-detail offer-id={selectedOfferId} onclose={closeDetail}></c-sr-offer-detail>
        </div>
      </div>
    </template>
  </div> 
</template>
