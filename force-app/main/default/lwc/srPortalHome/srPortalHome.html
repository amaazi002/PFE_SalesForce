<!-- force-app/main/default/lwc/srPortalHome/srPortalHome.html -->
<template>
  <div class="page">

    <div class="topbar">
      <template if:true={isGuest}>
        <div></div>
        <div class="actions">
          <lightning-button label="S'inscrire" variant="brand" onclick={openRegister}></lightning-button>
          <lightning-button class="slds-m-left_small" label="Se connecter" onclick={goLogin}></lightning-button>
        </div>
      </template>
      <template if:false={isGuest}>
        <div class="welcome">Bienvenue, {userFullName}</div>
      </template>
    </div>

    <div class="grid">
      <template for:each={offers} for:item="o">
        <c-sr-offer-tile key={o.Id} offer={o} onviewdetail={handleViewDetail}></c-sr-offer-tile>
      </template>
    </div>

    <!-- Overlay : grande carte Détail -->
    <template if:true={selectedOfferId}>
      <div class="overlay" role="dialog" aria-modal="true" onclick={closeDetail}>
        <div class="overlay__card" onclick={stop}>
          <c-sr-offer-detail offer-id={selectedOfferId} onclose={closeDetail}></c-sr-offer-detail>
        </div>
      </div>
    </template>

  </div>
</template>
